<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Auth Overlay ───────────────────────────────── -->
  <div id="auth-overlay" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-header">
        <span class="material-icons auth-logo">view_kanban</span>
        <h1 class="auth-title">Kanban Board</h1>
      </div>
      <p class="auth-subtitle">로그인하여 보드를 시작하세요</p>
      <div class="auth-social">
        <button class="social-btn" onclick="signInWithGoogle()">
          <svg class="social-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google로 계속하기
        </button>
        <button class="social-btn" onclick="signInWithGithub()">
          <svg class="social-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub로 계속하기
        </button>
      </div>
      <div class="auth-divider"><span>또는 이메일로</span></div>
      <form class="auth-form" onsubmit="handleEmailSubmit(event)">
        <input type="email" id="auth-email" class="auth-input" placeholder="이메일" required autocomplete="email" />
        <input type="password" id="auth-password" class="auth-input" placeholder="비밀번호 (6자 이상)" required autocomplete="current-password" minlength="6" />
        <button type="submit" id="auth-submit-btn" class="auth-submit-btn">로그인</button>
      </form>
      <div id="auth-message" class="auth-msg"></div>
      <p class="auth-toggle-row">
        <span id="auth-toggle-text">계정이 없으신가요?</span>
        <button class="auth-toggle-btn" id="auth-toggle-btn" onclick="toggleMode()">회원가입</button>
      </p>
    </div>
  </div>

  <!-- ── 카드 상세 모달 ──────────────────────────────── -->
  <div id="card-modal-overlay" class="modal-overlay hidden">
    <div class="card-modal">
      <div class="card-modal-header">
        <span class="material-icons" style="color:var(--primary)">edit_note</span>
        <h2 class="card-modal-title">카드 편집</h2>
        <button class="modal-close-btn" id="card-modal-close" aria-label="닫기">
          <span class="material-icons">close</span>
        </button>
      </div>
      <div class="card-modal-body">
        <label class="modal-label">내용</label>
        <textarea id="modal-text" class="modal-textarea" rows="3" placeholder="카드 내용"></textarea>

        <div class="modal-row">
          <div class="modal-field">
            <label class="modal-label">마감일</label>
            <input type="date" id="modal-due-date" class="modal-input" />
          </div>
          <div class="modal-field">
            <label class="modal-label">우선순위</label>
            <select id="modal-priority" class="modal-input">
              <option value="none">없음</option>
              <option value="low">낮음</option>
              <option value="medium">보통</option>
              <option value="high">높음</option>
            </select>
          </div>
        </div>

        <label class="modal-label">태그 <span style="color:var(--outline);font-weight:400">(쉼표로 구분)</span></label>
        <input type="text" id="modal-tags" class="modal-input" placeholder="기획, 디자인, 개발" />
      </div>
      <div class="card-modal-footer">
        <button class="modal-delete-btn" id="card-modal-delete">
          <span class="material-icons">delete</span> 삭제
        </button>
        <button class="modal-save-btn" id="card-modal-save">저장</button>
      </div>
    </div>
  </div>

  <!-- ── 공유 패널 ───────────────────────────────────── -->
  <div id="share-panel" class="side-panel hidden">
    <div class="panel-header">
      <span class="material-icons">group</span>
      <h3>보드 공유</h3>
      <button class="panel-close-btn" id="share-panel-close" aria-label="닫기">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="panel-body">
      <p class="panel-section-title">멤버 초대</p>
      <div class="invite-row">
        <input type="email" id="invite-email" class="panel-input" placeholder="이메일 주소" />
        <button id="invite-btn" class="invite-btn">
          <span class="material-icons">person_add</span>
        </button>
      </div>
      <div id="invite-message" class="invite-msg"></div>
      <p class="panel-section-title" style="margin-top:20px">현재 멤버</p>
      <div id="member-list" class="member-list"></div>
    </div>
  </div>

  <!-- ── 활동 로그 패널 ──────────────────────────────── -->
  <div id="activity-panel" class="side-panel hidden">
    <div class="panel-header">
      <span class="material-icons">history</span>
      <h3>활동 로그</h3>
      <button class="panel-close-btn" id="activity-panel-close" aria-label="닫기">
        <span class="material-icons">close</span>
      </button>
    </div>
    <div class="panel-body">
      <div id="activity-list" class="activity-list"></div>
    </div>
  </div>

  <!-- ── App Bar ────────────────────────────────────── -->
  <header class="app-bar">
    <span class="material-icons">view_kanban</span>
    <span id="board-name" class="app-title">Kanban Board</span>
    <div class="app-bar-right">
      <div id="member-avatars" class="member-avatars"></div>
      <button class="icon-btn" id="share-btn" title="보드 공유" aria-label="보드 공유">
        <span class="material-icons">group_add</span>
      </button>
      <button class="icon-btn" id="activity-btn" title="활동 로그" aria-label="활동 로그">
        <span class="material-icons">history</span>
      </button>
      <div id="user-info" class="user-info"></div>
      <button class="logout-btn" onclick="signOut()" title="로그아웃" aria-label="로그아웃">
        <span class="material-icons">logout</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="add-card-form">
      <span class="material-icons form-icon">add_card</span>
      <input type="text" id="card-input" placeholder="새 카드를 입력하세요" autocomplete="off" />
      <select id="column-select" aria-label="컬럼 선택">
        <option value="todo">To-do</option>
        <option value="inprogress">In-Progress</option>
        <option value="done">Done</option>
      </select>
      <button id="add-btn" aria-label="카드 추가">
        <span class="material-icons">add</span>
      </button>
    </div>

    <div class="board" id="board">
      <div class="column" id="col-todo" data-column="todo">
        <div class="column-header">
          <span class="material-icons col-icon">checklist</span>
          <span class="col-title">To-do</span>
          <span class="col-count" id="count-todo">0</span>
        </div>
        <div class="card-list" id="list-todo"></div>
      </div>
      <div class="column" id="col-inprogress" data-column="inprogress">
        <div class="column-header">
          <span class="material-icons col-icon">autorenew</span>
          <span class="col-title">In-Progress</span>
          <span class="col-count" id="count-inprogress">0</span>
        </div>
        <div class="card-list" id="list-inprogress"></div>
      </div>
      <div class="column" id="col-done" data-column="done">
        <div class="column-header">
          <span class="material-icons col-icon">done_all</span>
          <span class="col-title">Done</span>
          <span class="col-count" id="count-done">0</span>
        </div>
        <div class="card-list" id="list-done"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="db.js"></script>
  <script src="board.js"></script>
  <script src="app.js"></script>
</body>
</html>
